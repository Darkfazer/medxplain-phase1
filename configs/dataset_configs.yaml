# CheXpert v1.0 Dataset Configuration (14 Target Classes)

# ============================================================================
# 14 TARGET CLASSES (Full CheXpert Schema with Proper Mapping)
# ============================================================================

datasets:
  chexpert:
    root_dir: "data/CheXpert-v1.0-small"
    train_csv: "data/CheXpert-v1.0-small/train.csv"
    valid_csv: "data/CheXpert-v1.0-small/valid.csv"
    
    # 14 Target Classes with intelligent mapping to CheXpert observations
    classes: [
      "Atelectasis",
      "Cardiomegaly",
      "Effusion",
      "Infiltration", 
      "Mass",
      "Nodule",
      "Pneumonia",
      "Pneumothorax",
      "Consolidation",
      "Edema",
      "Emphysema",
      "Fibrosis",
      "Pleural_Thickening",
      "Hernia"
    ]
    num_classes: 14
    
    # CheXpert column mapping to target classes
    # Handles: direct mappings, renamed columns, multiple classes from one column
    chexpert_to_target:
      "Atelectasis": ["Atelectasis"]
      "Cardiomegaly": ["Cardiomegaly"]
      "Pleural Effusion": ["Effusion"]
      "Lung Opacity": ["Infiltration"]
      "Lung Lesion": ["Mass", "Nodule"]  # Multiple classes from one column
      "Pneumonia": ["Pneumonia"]
      "Pneumothorax": ["Pneumothorax"]
      "Consolidation": ["Consolidation"]
      "Edema": ["Edema"]
      "Pleural Other": ["Pleural_Thickening"]
    
    # Classes not present in CheXpert (set to 0 for all samples)
    missing_in_chexpert:
      - "Emphysema"
      - "Fibrosis"
      - "Hernia"
    
    # Preprocessing
    image_size: 224
    normalize:
      mean: [0.485, 0.456, 0.406]  # ImageNet defaults (transfer learning)
      std: [0.229, 0.224, 0.225]
    
    # Training parameters
    training:
      batch_size: 32
      num_epochs: 25
      learning_rate: 0.0001
      weight_decay: 0.0001
      optimizer: "AdamW"
      loss_function: "BCEWithLogitsLoss"
      
    # Data augmentation (training only)
    augmentation:
      resize: 256
      center_crop: 224
      random_horizontal_flip: 0.5
      random_rotation: 10
      color_jitter_brightness: 0.2
      color_jitter_contrast: 0.2
