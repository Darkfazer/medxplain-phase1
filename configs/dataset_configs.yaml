# NIH ChestX-ray14 & CheXpert Dataset Configurations

# Default Dataset Selection (can be overridden via CLI)
default_dataset: "nih" # Options: ["nih", "chexpert"]

datasets:
  nih:
    root_dir: "data/NIH_ChestXray"          # Update with absolute path if needed
    images_dir: "data/NIH_ChestXray/images"
    csv_path: "data/NIH_ChestXray/Data_Entry_2017.csv"
    train_val_list: "data/NIH_ChestXray/train_val_list.txt"
    test_list: "data/NIH_ChestXray/test_list.txt"
    split_ratios:
      train: 0.7
      val: 0.1
      test: 0.2
    
    # 14 Pathologies defined in NIH ChestX-ray14
    classes: [
      "Atelectasis", "Cardiomegaly", "Effusion", "Infiltration", 
      "Mass", "Nodule", "Pneumonia", "Pneumothorax", 
      "Consolidation", "Edema", "Emphysema", "Fibrosis", 
      "Pleural_Thickening", "Hernia"
    ]
    num_classes: 14
    
    # Preprocessing
    image_size: 224 # Default standard size
    normalize:
      mean: [0.485, 0.456, 0.406] # ImageNet defaults (best for transfer learning)
      std: [0.229, 0.224, 0.225]

  chexpert:
    root_dir: "data/CheXpert-v1.0-small"
    train_csv: "data/CheXpert-v1.0-small/train.csv"
    valid_csv: "data/CheXpert-v1.0-small/valid.csv"
    
    # CheXpert Observations
    classes: [
      "No Finding", "Enlarged Cardiomediastinum", "Cardiomegaly", 
      "Lung Opacity", "Lung Lesion", "Edema", "Consolidation", 
      "Pneumonia", "Atelectasis", "Pneumothorax", "Pleural Effusion", 
      "Pleural Other", "Fracture", "Support Devices"
    ]
    num_classes: 14
    
    # Preprocessing
    image_size: 224
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
